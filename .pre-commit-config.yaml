repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-fast
        name: pytest fast (unit tests only)
        entry: uv run pytest -m "not slow" --no-header -q
        language: system
        types: [python]
        pass_filenames: false
