repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-fast
        name: pytest fast (unit tests only)
        entry: uv run pytest -m "not slow" --no-header -q
        language: system
        types: [python]
        pass_filenames: false

      - id: generated-types-drift
        name: generated TS types drift check
        entry: uv run python -m sandbox_core.tools.generate_types --check
        language: system
        pass_filenames: false
        files: ^(app/sandbox_core/schemas\.py|app/sandbox_web/src/generated_types\.ts)$
